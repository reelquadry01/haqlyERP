# Author: Quadri Atharu
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-web
        run: npm ci

      - name: Build frontend
        working-directory: src-web
        run: npm run build

      - name: Download PostgreSQL binary (Windows)
        run: |
          curl -LO https://get.enterprisedb.com/postgresql/postgresql-16.4-1-windows-x64-binaries.zip
          7z x postgresql-16.4-1-windows-x64-binaries.zip -osrc-tauri\pg-bin

      - name: Code sign (Windows)
        run: |
          signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /a src-tauri/target/release/bundle/msi/*.msi
        env:
          SIGNTOOL_PATH: ${{ secrets.WINDOWS_SIGNTOOL_PATH }}
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: "HAQLY ERP ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install HAQLY ERP."
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  build-macos:
    name: Build macOS
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-web
        run: npm ci

      - name: Build frontend
        working-directory: src-web
        run: npm run build

      - name: Download PostgreSQL binary (macOS)
        run: |
          curl -LO https://get.enterprisedb.com/postgresql/postgresql-16.4-1-darwin-binaries.zip
          unzip postgresql-16.4-1-darwin-binaries.zip -d src-tauri/pg-bin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: "HAQLY ERP ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install HAQLY ERP."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

  build-ai-wheel:
    name: Build AI Engine Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build wheel

      - name: Build wheel
        working-directory: src-ai
        run: python -m build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: haqly-ai-wheel
          path: src-ai/dist/*.whl

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-ai-wheel]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Download AI wheel
        uses: actions/download-artifact@v4
        with:
          name: haqly-ai-wheel
          path: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HAQLY ERP ${{ github.ref_name }}"
          body: |
            ## HAQLY ERP ${{ github.ref_name }}

            ### Desktop Installers
            Download the installer for your platform from the assets below.

            ### AI Engine
            The Python AI engine wheel is included in the release assets.

            ### Changes
            See commit history for changes in this release.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            dist/*.whl
