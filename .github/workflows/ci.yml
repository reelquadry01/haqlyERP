name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Check src-server
        working-directory: src-server
        run: cargo check --locked

      - name: Check src-tauri
        working-directory: src-tauri
        run: cargo check --locked

      - name: Clippy src-server
        working-directory: src-server
        run: cargo clippy -- -D warnings

      - name: Clippy src-tauri
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Rustfmt check src-server
        working-directory: src-server
        run: cargo fmt -- --check

      - name: Rustfmt check src-tauri
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run src-server tests
        working-directory: src-server
        run: cargo test --locked
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/haqly_test

  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: src-ai
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Ruff check
        working-directory: src-ai
        run: ruff check .

      - name: Ruff format check
        working-directory: src-ai
        run: ruff format --check .

      - name: MyPy
        working-directory: src-ai
        run: mypy . --ignore-missing-imports

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src-web/package-lock.json

      - name: Install dependencies
        working-directory: src-web
        run: npm ci

      - name: TypeScript check
        working-directory: src-web
        run: npx tsc --noEmit

      - name: Build Next.js
        working-directory: src-web
        run: npm run build
