# Author: Quadri Atharu
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: haqly
          POSTGRES_PASSWORD: haqly
          POSTGRES_DB: haqly_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: src-server -> target }
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres
      - name: Run migrations
        env: { DATABASE_URL: postgresql://haqly:haqly@localhost:5432/haqly_test }
        run: cd src-server && sqlx migrate run
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        env: { DATABASE_URL: postgresql://haqly:haqly@localhost:5432/haqly_test, TEST_DATABASE_URL: postgresql://haqly:haqly@localhost:5432/haqly_test, HAQLY_ENV: development, NAIJA_ENGINE_ENV: development }
        run: cd src-server && cargo test
      - name: cargo test integration
        env: { DATABASE_URL: postgresql://haqly:haqly@localhost:5432/haqly_test, TEST_DATABASE_URL: postgresql://haqly:haqly@localhost:5432/haqly_test, HAQLY_ENV: development }
        run: cd src-server && cargo test --ignored

  python-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dependencies
        run: cd src-ai && pip install -e ".[dev]"
      - name: ruff check
        run: cd src-ai && ruff check .
      - name: pytest
        run: cd src-ai && pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install dependencies
        run: cd src-web && npm ci
      - name: Build
        run: cd src-web && npm run build
      - name: Type check
        run: cd src-web && npx tsc --noEmit
