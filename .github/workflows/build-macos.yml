name: Build macOS
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install frontend deps
        run: cd src-web && npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQLX_OFFLINE: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HAQLY ERP ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the macOS app.'
          releaseDraft: true
          prerelease: false
